# .github/workflows/neuralspace-scan.yml
name: NeuralSpace Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install NeuralSpace
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Train the AI model
        run: |
          python -m neuralspace.cli generate
          python -m neuralspace.cli train

      - name: Remove training data
        run: rm -rf training_data

      - name: Scan repository
        run: |
          # Scan everything EXCEPT the test_codebase folder.
          # We pass a list of directories to scan, excluding test_codebase.
          # Since we cannot exclude folders in the CLI directly, we simply scan the root,
          # but we ensure test_codebase is ignored in the check step below.
          python -m neuralspace.cli scan . --quarantine rename

      - name: Check for threats (IGNORING test_codebase)
        run: |
          # Look for .py.quarantined files, but ignore anything inside test_codebase/
          if find . -type f -name "*.py.quarantined" -not -path "./test_codebase/*" | grep -q .; then
            echo "❌ Threats found outside test_codebase! Please check the logs."
            exit 1
          else
            echo "✅ No threats detected outside test_codebase."
          fi