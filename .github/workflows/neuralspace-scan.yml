# .github/workflows/neuralspace-scan.yml
name: NeuralSpace Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install NeuralSpace and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install requests fastapi uvicorn
          python -m pip install tree-sitter tree-sitter-python tree-sitter-javascript tree-sitter-typescript tree-sitter-go tree-sitter-rust
          python -m pip install pyyaml cryptography

      - name: Train the AI model
        run: |
          python -m neuralspace.cli generate
          python -m neuralspace.cli train

      - name: Remove training data
        run: rm -rf training_data

      - name: Scan ONLY the new tests folder
        run: |
          # Scan the entire tests/ folder (which contains test_js/, test_go/, etc.)
          python -m neuralspace.cli scan tests --quarantine rename

      - name: Check for threats (ignore test folders)
        run: |
          if find . -name "*.py.quarantined" | grep -q .; then
            echo "❌ Threats found in the tests folder!"
            exit 1
          else
            echo "✅ No threats detected in tests folder."
          fi