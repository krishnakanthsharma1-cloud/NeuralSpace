name: NeuralSpace Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install NeuralSpace
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Train the AI model
        run: |
          python -m neuralspace.cli generate
          python -m neuralspace.cli train

      - name: Remove training data and test_codebase
        run: |
          rm -rf training_data
          rm -rf test_codebase

      - name: Scan repository (only safe code remains)
        run: |
          python -m neuralspace.cli scan . --quarantine rename

      - name: Check for threats
        run: |
          if find . -name "*.py.quarantined" | grep -q .; then
            echo "❌ Threats found in the codebase!"
            exit 1
          else
            echo "✅ No threats detected."
          fi